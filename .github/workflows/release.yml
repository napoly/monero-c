name: Release

on:
  push:
    tags:
      - 'v*'

jobs:
  build-linux-x64:
    uses: ./.github/workflows/build-linux-x64.yml

  build-linux-arm64:
    uses: ./.github/workflows/build-linux-arm64.yml

  build-macos-x64:
    uses: ./.github/workflows/build-macos-x64.yml

  build-macos-arm64:
    uses: ./.github/workflows/build-macos-arm64.yml

  build-windows-x64:
    uses: ./.github/workflows/build-windows-x64.yml

  release:
    runs-on: ubuntu-latest
    needs:
      - build-linux-x64
      - build-linux-arm64
      - build-macos-x64
      - build-macos-arm64
      - build-windows-x64
    permissions:
      contents: write

    steps:
      - name: Download all artifacts
        uses: actions/download-artifact@v8
        with:
          path: artifacts/

      - name: Rename for release
        run: |
          mkdir release/
          cp artifacts/libmonero-cpp-linux-x64.so/libmonero-cpp.so          release/libmonero-cpp-linux-x64.so
          cp artifacts/libmonero-c-linux-x64.so/libmonero-c.so              release/libmonero-c-linux-x64.so
          cp artifacts/libmonero-cpp-linux-arm64.so/libmonero-cpp.so        release/libmonero-cpp-linux-arm64.so
          cp artifacts/libmonero-c-linux-arm64.so/libmonero-c.so            release/libmonero-c-linux-arm64.so
          cp artifacts/libmonero-cpp-macos-x64.dylib/libmonero-cpp.dylib    release/libmonero-cpp-macos-x64.dylib
          cp artifacts/libmonero-c-macos-x64.dylib/libmonero-c.dylib        release/libmonero-c-macos-x64.dylib
          cp artifacts/libmonero-cpp-macos-arm64.dylib/libmonero-cpp.dylib  release/libmonero-cpp-macos-arm64.dylib
          cp artifacts/libmonero-c-macos-arm64.dylib/libmonero-c.dylib      release/libmonero-c-macos-arm64.dylib
          cp artifacts/libmonero-cpp-win-x64.dll/libmonero-cpp.dll      release/libmonero-cpp-win-x64.dll
          cp artifacts/libmonero-c-win-x64.dll/libmonero-c.dll          release/libmonero-c-win-x64.dll

      - name: Create GitHub Release
        uses: softprops/action-gh-release@b4309332981a82ec1c5618f44dd2e27cc8bfbfda
        with:
          tag_name: ${{ github.ref_name }}
          name: Release ${{ github.ref_name }}
          draft: true
          prerelease: false
          generate_release_notes: true
          files: release/*